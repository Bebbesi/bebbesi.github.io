<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wz~ • Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d14;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139, 92, 246, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(236, 72, 153, 0.12) 0%, transparent 60%);
      font-family: 'Nunito', sans-serif;
    }

    /* ── Card ── */
    .card {
      width: 300px;
      border-radius: 16px;
      overflow: hidden;
      background: #18182a;
      border: 1px solid rgba(139, 92, 246, 0.35);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 8px 40px rgba(0,0,0,0.55),
        0 0 60px rgba(139, 92, 246, 0.12);
      position: relative;
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Banner ── */
    .banner {
      width: 100%;
      height: 110px;
      object-fit: cover;
      display: block;
      position: relative;
    }

    .banner-wrap {
      position: relative;
      overflow: hidden;
    }

    .banner-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, #18182a 100%);
    }

    /* ── Avatar area ── */
    .avatar-row {
      padding: 0 14px;
      position: relative;
      margin-top: -36px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .avatar-wrap {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 4px solid #18182a;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      z-index: 2;
      box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.5);
      transition: box-shadow 0.3s;
    }

    .avatar-wrap:hover {
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.9), 0 0 18px rgba(139,92,246,0.4);
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* status badge */
    .status-dot {
      position: absolute;
      bottom: 4px; right: 4px;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #3ba55d;
      border: 2px solid #18182a;
      z-index: 3;
    }

    .location-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 11px;
      color: #b9bcd6;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .location-pill svg { flex-shrink: 0; }

    .add-status {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 5px 10px;
      font-size: 11px;
      color: #b9bcd6;
      cursor: pointer;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 4px;
    }

    .add-status:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(139,92,246,0.5);
    }

    .add-status svg { flex-shrink: 0; }

    /* ── Body ── */
    .body {
      padding: 10px 14px 14px;
    }

    .username {
      font-size: 20px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .username span {
      color: #a78bfa;
    }

    .display-icon {
      display: inline-flex;
      align-items: center;
      margin-left: 4px;
      opacity: 0.7;
      font-size: 13px;
    }

    .tag {
      font-size: 12px;
      color: #7c7f99;
      margin-top: 1px;
      font-weight: 600;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 10px 0;
    }

    /* ── Badges ── */
    .badges {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
    }

    .badge:hover { transform: scale(1.25) rotate(-5deg); }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: 4px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 9px 14px;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: transform 0.18s, filter 0.18s, box-shadow 0.18s;
      letter-spacing: 0.2px;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.12);
    }

    .btn:active {
      transform: translateY(0px);
      filter: brightness(0.95);
    }

    .btn-spotify {
      background: linear-gradient(135deg, #1db954 0%, #17a349 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(29,185,84,0.3);
    }

    .btn-steam {
      background: linear-gradient(135deg, #1b2838 0%, #2a475e 100%);
      color: #c7d5e0;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4);
      border: 1px solid rgba(102,192,244,0.2);
    }

    .btn-osu {
      background: linear-gradient(135deg, #ff66ab 0%, #e0509a 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(255,102,171,0.35);
    }

    .btn-instagram {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: #fff;
      box-shadow: 0 4px 14px rgba(220,39,67,0.35);
    }

    .btn svg, .btn img {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* ── Annotation (monitor arrow) ── */
    .annotation {
      position: absolute;
      top: 10px;
      right: 12px;
      z-index: 10;
      pointer-events: none;
    }

    .annotation-text {
      font-family: 'Caveat', cursive;
      font-size: 22px;
      color: #fff;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
      transform: rotate(-4deg);
      display: block;
    }

    .annotation-arrow {
      font-size: 20px;
      transform: rotate(10deg) scaleX(-1);
      display: inline-block;
      margin-right: 4px;
    }
  </style>
</head>
